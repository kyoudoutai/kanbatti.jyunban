<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缶バッジ制作所順番確認</title>
    <style>
        /* ここでデザインを調整してください！ */
        body { font-family: sans-serif; text-align: center; background: #ffffff; color: #333; padding: 50px 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2rem; color: #666; }
        #status-box { margin: 30px 0; padding: 20px; border-radius: 10px; font-weight: bold; font-size: 1.5rem; }
        .working { background: #fff3cd; color: #856404; } /* 作業中の色 */
        .done { background: #d4edda; color: #155724; }    /* 完成の色 */
        input { width: 80%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1rem; text-align: center; }
        button { margin-top: 10px; padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>缶バッジ制作状況確認</h1>
    <p>整理券の番号を入力してください</p>
    <input type="number" id="user-number" min="1" placeholder="例：5">
    <br>
    <button onclick="checkStatus()">状況を確認する</button>

    <div id="result-area" style="display:none;">
        <div id="status-box"></div>
        <p id="message"></p>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxlHf33k7fXFmMjqEc6zP9ix6omVL9QlCURTLKjs0vmXrMxTLneYLS9JTVtuNlpoqeM/exec";

    async function checkStatus() {
        const rArea = document.getElementById('result-area');
        const sBox = document.getElementById('status-box');
        const msg = document.getElementById('message');
        const userNo = document.getElementById('user-number').value;

        if (!userNo || userNo < 1) {
            alert("1以上の番号を入力してください");
            return;
        }

        // ★モッサリ対策：ボタンを押した瞬間に「確認中」と出して安心させる
        rArea.style.display = "block";
        sBox.innerText = "確認中...";
        sBox.className = "";
        msg.innerText = "最新の状況をチェックしています。";

        try {
            // キャッシュ対策（常に最新を取るための呪文）をURLに付け足します
            const response = await fetch(GAS_URL + "?t=" + new Date().getTime(), {
                method: "GET",
                redirect: "follow"
            });

            if (!response.ok) throw new Error('ネットワークエラー');

            const data = await response.json();
            const myData = data.find(item => item.id === userNo.toString());

            if (myData) {
                // ★ここをスプレッドシートの文字と「完全一致」させてください
                const currentStatus = myData.status.trim(); // 空白を消すおまじない
                
                sBox.innerText = currentStatus;

                if (currentStatus === "完了") { 
                    sBox.className = "done";
                    msg.innerText = "お待たせしました。ブースへお越しください！";
                } else {
                    sBox.className = "working";
                    msg.innerText = "ただいま制作中です！";
                }
            } else {
                sBox.innerText = "未登録";
                sBox.className = "";
                msg.innerText = "その番号はまだ登録されていません。";
            }
        } catch (e) {
            console.error("エラー詳細:", e);
            sBox.innerText = "エラー";
            msg.innerText = "データの取得に失敗しました。";
        }
    }
</script>

</body>
</html>
